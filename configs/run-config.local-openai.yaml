run_id: "local-openai-4o-51"
created_at: "2026-02-13T09:00:00+09:00"

dataset:
  testcases_path: "data/testcases.jsonl"
  dataset_version: "dev_v1"
  holdout: false

candidates:
  - candidate_id: "openai-4o"
    vendor: "openai"
    model_id: "gpt-4o"
    prompt_version: "v1"
    generation_params:
      temperature: 0
      top_p: 1
      max_tokens: 8192
  - candidate_id: "openai-51"
    vendor: "openai"
    model_id: "gpt-5.1"
    prompt_version: "v1"
    generation_params:
      temperature: 0
      top_p: 1
